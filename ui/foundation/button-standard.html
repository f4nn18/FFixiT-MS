<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Button Standard Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .btn-success {
        background-color: var(--success);
        border-color: var(--success);
      }
      .btn-warning {
        background-color: var(--warning);
        border-color: var(--warning);
        color: #000;
      }
      .btn-danger {
        background-color: var(--danger);
        border-color: var(--danger);
      }
      .btn-outline-secondary:hover {
        color: var(--text);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="card rounded-4 border-0">
        <div class="card-body p-4">
          <h1 class="h4 fw-bold mb-2">Button Standard</h1>
          <p class="text-muted mb-4">
            Primary, secondary, success, warning, danger, outline, and icon
            buttons should share a consistent visual language.
          </p>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-primary">
              <i class="bi bi-check2-circle me-2"></i>Primary
            </button>
            <button class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-2"></i>Secondary
            </button>
            <button class="btn btn-success">
              <i class="bi bi-check-lg me-2"></i>Success
            </button>
            <button class="btn btn-warning">
              <i class="bi bi-exclamation-triangle me-2"></i>Warning
            </button>
            <button class="btn btn-danger">
              <i class="bi bi-trash me-2"></i>Danger
            </button>
            <button class="btn btn-outline-primary">
              <i class="bi bi-pencil me-2"></i>Edit
            </button>
            <button class="btn btn-outline-secondary rounded-circle">
              <i class="bi bi-three-dots"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
