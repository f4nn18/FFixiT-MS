<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Top Navbar Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <nav class="topbar px-4 py-3">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h4 fw-bold mb-0">Top Navbar</h1>
          <div class="text-muted small">Global actions and user context</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-search me-2"></i>Search
          </button>
          <button class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-bell me-2"></i>Alerts
          </button>
          <button class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-2"></i>New
          </button>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="card rounded-4 border-0">
        <div class="card-body p-4">
          <h2 class="h5 fw-bold mb-2">Toolbar Foundation</h2>
          <p class="text-muted mb-0">
            The top navigation should support search, alerts, and primary
            actions without disrupting the page hierarchy.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
