<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Form Standard Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .btn-outline-secondary:hover {
        color: var(--text);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="card rounded-4 border-0">
        <div class="card-body p-4">
          <h1 class="h4 fw-bold mb-2">Form Standard</h1>
          <p class="text-muted mb-4">
            Consistent labels, required field markers, validation states, and
            action buttons.
          </p>

          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold"
                >Full Name <span class="text-danger">*</span></label
              >
              <input
                type="text"
                class="form-control"
                placeholder="Enter full name"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold"
                >Email <span class="text-danger">*</span></label
              >
              <input
                type="email"
                class="form-control"
                placeholder="name@example.com"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Role</label>
              <select class="form-select">
                <option selected>Select role</option>
                <option>Customer Service</option>
                <option>Technician</option>
                <option>Warehouse</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone Number</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter phone number"
              />
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notes</label>
              <textarea
                class="form-control"
                rows="4"
                placeholder="Add notes or details"
              ></textarea>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="agree" />
                <label class="form-check-label" for="agree"
                  >I confirm that the information above is accurate.</label
                >
              </div>
            </div>
            <div class="col-12 d-flex gap-2 justify-content-end">
              <button class="btn btn-outline-secondary" type="button">
                Cancel
              </button>
              <button class="btn btn-primary" type="submit">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
