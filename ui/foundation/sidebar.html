<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Sidebar Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .sidebar {
        width: 260px;
        min-height: 100vh;
        background: #243447;
      }
      .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.82);
        border-radius: 0.75rem;
        padding: 0.7rem 0.95rem;
      }
      .sidebar .nav-link.active,
      .sidebar .nav-link:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <aside class="sidebar p-3">
        <div class="d-flex align-items-center gap-2 mb-4 px-2">
          <div
            class="rounded-3 d-flex align-items-center justify-content-center text-white"
            style="
              width: 42px;
              height: 42px;
              background: linear-gradient(135deg, var(--primary), #3b82f6);
            "
          >
            <i class="bi bi-pc-display"></i>
          </div>
          <div>
            <div class="fw-semibold text-white">FFixiT-MS</div>
            <div class="small text-white-50">Foundation</div>
          </div>
        </div>
        <nav class="nav flex-column gap-1">
          <a href="#" class="nav-link active"
            ><i class="bi bi-speedometer2 me-2"></i>Dashboard</a
          >
          <a href="#" class="nav-link"
            ><i class="bi bi-people me-2"></i>Customers</a
          >
          <a href="#" class="nav-link"
            ><i class="bi bi-ticket-detailed me-2"></i>Tickets</a
          >
          <a href="#" class="nav-link"
            ><i class="bi bi-box-seam me-2"></i>Inventory</a
          >
          <a href="#" class="nav-link"><i class="bi bi-receipt me-2"></i>POS</a>
          <a href="#" class="nav-link"
            ><i class="bi bi-bar-chart me-2"></i>Reports</a
          >
        </nav>
      </aside>
      <main class="flex-grow-1 p-4">
        <div class="card rounded-4 border-0">
          <div class="card-body p-4">
            <h1 class="h3 fw-bold mb-2">Sidebar Foundation</h1>
            <p class="text-muted mb-4">
              This layout establishes the standard sidebar navigation used
              across the application shell.
            </p>
            <button class="btn btn-primary">Review Layout</button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
