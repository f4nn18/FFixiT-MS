<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Page Header Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="card rounded-4 border-0">
        <div class="card-body p-4">
          <div
            class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3"
          >
            <div>
              <h1 class="h3 fw-bold mb-1">Page Header</h1>
              <p class="text-muted mb-0">
                Clear page title, supporting description, and primary action.
              </p>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Back
              </button>
              <button class="btn btn-primary">
                <i class="bi bi-plus-lg me-2"></i>Create New
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
