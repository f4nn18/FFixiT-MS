<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | 403</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="card rounded-4 border-0 text-center p-5">
        <div class="display-1 fw-bold text-warning mb-3">403</div>
        <h1 class="h3 fw-bold mb-2">Access Restricted</h1>
        <p class="text-muted mb-4">
          You do not have permission to view this section of the application.
        </p>
        <a href="dashboard-layout.html" class="btn btn-primary"
          ><i class="bi bi-house me-2"></i>Return Home</a
        >
      </div>
    </div>
  </body>
</html>
