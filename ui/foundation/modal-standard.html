<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Modal Standard Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .btn-outline-secondary:hover {
        color: var(--text);
      }
      .btn-danger {
        background-color: var(--danger);
        border-color: var(--danger);
      }
      .text-muted {
        color: var(--muted) !important;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="card rounded-4 border-0">
        <div class="card-body p-4">
          <h1 class="h4 fw-bold mb-2">Modal Standard</h1>
          <p class="text-muted mb-4">
            Use modal dialogs for focused confirmation and high-importance
            actions.
          </p>
          <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#foundationModal"
          >
            Open Modal
          </button>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="foundationModal"
      tabindex="-1"
      aria-labelledby="foundationModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold" id="foundationModalLabel">
              Confirm Action
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="text-muted mb-0">
              This modal demonstrates the standard confirmation layout for
              destructive or critical actions.
            </p>
          </div>
          <div class="modal-footer border-0">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-danger">Continue</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
