<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFixiT-MS | Login Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0d6efd;
        --primary-dark: #0a58ca;
        --secondary: #6c757d;
        --success: #198754;
        --warning: #ffc107;
        --danger: #dc3545;
        --info: #0dcaf0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
      }
      body {
        background: linear-gradient(135deg, #f8f9fa 0%, #eef3f8 100%);
        color: var(--text);
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      .card {
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .btn-primary {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-dark);
        border-color: var(--primary-dark);
      }
      .text-muted {
        color: var(--muted) !important;
      }
      .brand-badge {
        width: 54px;
        height: 54px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        color: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card border-0 rounded-4 overflow-hidden">
            <div class="card-body p-5">
              <div class="text-center mb-4">
                <div class="brand-badge mx-auto mb-3">
                  <i class="bi bi-pc-display"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">FFixiT-MS</h1>
                <p class="text-muted mb-0">
                  Computer Store, Service &amp; Inventory Management System
                </p>
              </div>

              <form>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Email</label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    placeholder="Enter your email"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Password</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    placeholder="Enter your password"
                  />
                </div>
                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="rememberMe"
                    />
                    <label class="form-check-label text-muted" for="rememberMe"
                      >Remember me</label
                    >
                  </div>
                  <a href="#" class="small text-decoration-none"
                    >Forgot password?</a
                  >
                </div>
                <button class="btn btn-primary btn-lg w-100">Sign In</button>
              </form>

              <div class="mt-4 text-center small text-muted">
                Secure access for service, inventory, and operations teams.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
